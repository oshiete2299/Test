  /* ---- PWA: service worker (blob URL), cache-first shell cho phép chạy offline ---- */

    const swSource =

      '        }).catch(function() { return cached; });' +
      '        return cached || fetchPromise;' +
      '      });' +
      '    })' +
      '  );' +
      '});';
    const swBlob = new Blob([swSource], { type: "application/javascript" });
    const swUrl = URL.createObjectURL(swBlob);
    window.addEventListener("load", function() {

<style>
  :root {
    --bg-base: #05070C;
    --bg-surface: #0B0F18;
    --bg-input: #0E1320;
    --bg-elevated: #151D2D;
    --border-primary: #1E2840;
    --text-primary: #E4EAF4;
    --text-secondary: #C3CCDC;
    --text-tertiary: #8A9AB8;
    --text-muted: #5A6478;
    --text-faint: #4E607A;
  }
  body.theme-light {
    --bg-base: #F4F6FA;
    --bg-surface: #FFFFFF;
    --bg-input: #F0F2F7;
    --bg-elevated: #E7EBF3;
    --border-primary: #D7DEEA;
    --text-primary: #101625;
    --text-secondary: #2C3548;
    --text-tertiary: #5C6780;
    --text-muted: #7C88A0;
    --text-faint: #8E9AB3;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg-base);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow: hidden;
    color: var(--text-primary);
    transition: background 200ms ease, color 200ms ease;
  }
  #app { position: relative; width: 100%; height: 100%; }

  .topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; z-index: 50;
    background: linear-gradient(180deg, rgba(5,7,12,0.95), rgba(5,7,12,0));
  }
  .burger {
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  }
  .burger span { width: 18px; height: 2px; background: var(--text-primary); border-radius: 2px; }
  .topbar-title { font-size: 13px; font-weight: 700; color: var(--text-primary); letter-spacing: 0.2px; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .topbar-stats { font-size: 11px; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; }
  .theme-toggle-btn {
    width: 30px; height: 30px; border-radius: 8px; border: none;
    background: rgba(255,255,255,0.06); color: var(--text-primary);
    font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .theme-toggle-btn:active { transform: scale(0.92); }

  .overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.55);
    opacity: 0; pointer-events: none; transition: opacity 220ms ease; z-index: 60;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: absolute; top: 0; left: 0; bottom: 0; width: 78%; max-width: 320px;
    background: var(--bg-surface); border-right: 1px solid var(--border-primary);
    transform: translateX(-100%); transition: transform 260ms cubic-bezier(.2,.8,.2,1);
    z-index: 70; display: flex; flex-direction: column; overflow: hidden;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-header {
    padding: 18px 16px 14px; border-bottom: 1px solid var(--bg-elevated);
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-header h1 { font-size: 16px; margin: 0; font-weight: 700; }
  .drawer-close { background: none; border: none; color: var(--text-tertiary); font-size: 20px; cursor: pointer; line-height: 1; padding: 4px; }
  .drawer-body { flex: 1; overflow-y: auto; padding: 10px 8px 10px; }

  .subject-block { margin-bottom: 6px; }
  .subject-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 10px; border-radius: 10px; cursor: pointer;
    transition: background 150ms;
  }
  .subject-row:active { background: rgba(255,255,255,0.06); }
  .subject-icon { font-size: 18px; width: 24px; text-align: center; }
  .subject-name { font-size: 14.5px; font-weight: 600; flex: 1; }
  .subject-chevron { font-size: 11px; color: var(--text-muted); transition: transform 200ms; }

  .chapter-list { padding-left: 38px; max-height: 0; overflow: hidden; transition: max-height 280ms ease; }

  .chapter-row {

  .chapter-row-right { display: flex; align-items: center; gap: 8px; }
  .wrong-review-btn {

    border: 1px solid rgba(251,191,36,0.4); border-radius: 999px;
    padding: 3px 8px; cursor: pointer; white-space: nowrap;
  }
  .wrong-review-btn:active { background: rgba(251,191,36,0.22); }

  .empty-hint { padding: 24px 16px; text-align: center; color: var(--text-muted); font-size: 12.5px; line-height: 1.6; }

  .drawer-footer {

    padding: 14px 16px; background: var(--bg-surface); border-top: 1px solid var(--bg-elevated);

  .url-import-btn {
    padding: 10px 14px; border-radius: 10px; border: none;
    background: #38BDF8; color: #042C53; font-size: 12.5px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .url-import-btn:active { transform: scale(0.97); }
  .pwa-install-btn {
    width: 100%; margin-top: 8px; padding: 12px; border-radius: 10px; border: 1px dashed #38BDF866;
    background: rgba(56,189,248,0.08); color: #38BDF8; font-size: 13px; font-weight: 600;
    cursor: pointer; display: none; align-items: center; justify-content: center; gap: 8px;
  }
  .pwa-install-btn.show { display: flex; }
  .share-btn {
    width: 100%; margin-top: 8px; padding: 12px; border-radius: 10px; border: 1px dashed #FBBF2466;
    background: rgba(251,191,36,0.08); color: #FBBF24; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .export-all-btn {

    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .import-all-btn {
    width: 100%; margin-top: 8px; padding: 12px; border-radius: 10px; border: 1px dashed #C084FC66;

    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .import-btn {
    width: 100%; padding: 12px; border-radius: 10px; border: 1px dashed #38BDF866;
    background: rgba(56,189,248,0.08); color: #38BDF8; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  #fileInput { display: none; }
  #progressFileInput { display: none; }
  .export-btn {
    width: 100%; margin-top: 8px; padding: 12px; border-radius: 10px; border: 1px dashed #4ADE8066;
    background: rgba(74,222,128,0.08); color: #4ADE80; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .import-progress-btn {
    width: 100%; margin-top: 8px; padding: 12px; border-radius: 10px; border: 1px dashed #C084FC66;
    background: rgba(192,132,252,0.08); color: #C084FC; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .reset-btn {
    width: 100%; margin-top: 8px; padding: 9px; border-radius: 10px; border: none;
    background: transparent; color: var(--text-muted); font-size: 11.5px; cursor: pointer;
  }

  .quiz-screen {
    position: absolute; inset: 0; display: none; flex-direction: column;
    padding-top: 52px;
  }
  .quiz-screen.active { display: flex; }

  .quiz-progress-bar { height: 3px; background: var(--bg-elevated); margin: 0 14px; border-radius: 2px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: #38BDF8; transition: width 250ms ease; border-radius: 2px; }

  .quiz-meta-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 0; }
  .quiz-meta-left { display: flex; align-items: center; gap: 6px; }
  .quiz-meta-right { display: flex; align-items: center; gap: 8px; }
  .quiz-chapter-tag { font-size: 11.5px; color: var(--text-tertiary); font-weight: 600; }
  .quiz-counter { font-size: 11.5px; color: var(--text-muted); }
  .shuffle-indicator {
    font-size: 10px; color: #C084FC; background: rgba(192,132,252,0.12);
    border: 1px solid rgba(192,132,252,0.35); border-radius: 999px;
    padding: 2px 7px; white-space: nowrap; display: none;
  }
  .shuffle-indicator.show { display: inline-block; }
  .mode-toggle-btn {
    font-size: 10px; font-weight: 700; color: #FBBF24; background: rgba(251,191,36,0.12);
    border: 1px solid rgba(251,191,36,0.35); border-radius: 999px;
    padding: 2px 8px; cursor: pointer; white-space: nowrap;
  }
  .mode-toggle-btn.study-mode {
    color: #4ADE80; background: rgba(74,222,128,0.12); border-color: rgba(74,222,128,0.35);
  }
  .bookmark-btn {
    font-size: 17px; line-height: 1; background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 2px 4px;
  }
  .bookmark-btn.active { color: #FBBF24; }

  .quiz-body {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    padding: 18px 22px 0; overflow: hidden;
  }

  .question-card { transition: transform 200ms ease, opacity 200ms ease; }
  .question-card.shake { animation: shakeAnim 420ms; }
  @keyframes shakeAnim {
    10%, 90% { transform: translateX(-3px); }
    20%, 80% { transform: translateX(5px); }
    30%, 50%, 70% { transform: translateX(-9px); }
    40%, 60% { transform: translateX(9px); }
  }

  .question-text { font-size: 19px; line-height: 1.45; font-weight: 600; color: var(--text-primary); margin: 0 0 26px 0; }

  .options { display: flex; flex-direction: column; gap: 11px; }
  .option {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 12px;
    background: var(--bg-input); border: 1.5px solid var(--border-primary);
    font-size: 15px; color: var(--text-secondary); cursor: pointer;
    transition: background 150ms, border-color 150ms, transform 100ms;
  }
  .option:active { transform: scale(0.98); }
  .option-letter {
    width: 26px; height: 26px; border-radius: 8px; background: var(--bg-elevated);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text-muted); flex-shrink: 0;
  }
  .option.correct { background: rgba(74,222,128,0.14); border-color: #4ADE80; animation: pulseGreen 480ms ease; }
  .option.correct .option-letter { background: #4ADE80; color: #04342C; }
  .option.wrong { background: rgba(248,113,113,0.14); border-color: #F87171; }
  .option.wrong .option-letter { background: #F87171; color: #501313; }
  .option.dim { opacity: 0.35; }
  @keyframes pulseGreen {
    0% { transform: scale(1); }
    40% { transform: scale(1.035); }
    100% { transform: scale(1); }
  }

  .feedback-banner {
    margin-top: 18px; padding: 12px 14px; border-radius: 10px;
    font-size: 13.5px; line-height: 1.5; opacity: 0; transform: translateY(8px);
    transition: opacity 220ms ease, transform 220ms ease;
  }
  .feedback-banner.show { opacity: 1; transform: translateY(0); }
  .feedback-banner.correct { background: rgba(74,222,128,0.1); color: #8FE5A8; border: 1px solid rgba(74,222,128,0.3); }
  .feedback-banner.wrong { background: rgba(248,113,113,0.1); color: #F5A3A3; border: 1px solid rgba(248,113,113,0.3); }

  .quiz-footer { padding: 16px 22px 22px; }
  .next-btn {

  }
  .next-btn.show { opacity: 1; pointer-events: auto; }
  .next-btn:active { transform: scale(0.98); }

  .combo-badge {
    position: absolute; top: 58px; right: 16px;
    background: rgba(251,191,36,0.15); color: #FBBF24; border: 1px solid rgba(251,191,36,0.35);

  }
  .combo-badge.show { opacity: 1; transform: scale(1) translateY(0); }

  .flash {
    position: absolute; inset: 0; pointer-events: none; z-index: 80;
    opacity: 0; transition: opacity 320ms ease;
  }
  .flash.correct { background: radial-gradient(circle at 50% 30%, rgba(74,222,128,0.18), transparent 70%); }
  .flash.wrong { background: radial-gradient(circle at 50% 30%, rgba(248,113,113,0.16), transparent 70%); }
  .flash.show { opacity: 1; }

  .home-screen {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 0 32px; text-align: center;
    padding-top: 52px;
    overflow-y: auto;
  }
  .home-screen.hidden { display: none; }
  .home-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.8; }
  .home-title { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
  .home-sub { font-size: 13.5px; color: var(--text-tertiary); line-height: 1.6; margin: 0 0 22px; }
  .home-cta { padding: 13px 22px; border-radius: 12px; background: rgba(56,189,248,0.12); border: 1px solid #38BDF855; color: #38BDF8; font-size: 13.5px; font-weight: 600; cursor: pointer; }

  /* ---- Home Dashboard ---- */
  .home-dashboard {
    width: 100%; max-width: 400px;
    display: flex; flex-direction: column;
    gap: 18px;
    text-align: left;
  }

  /* Stats */
  .home-stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-item {
    background: rgba(255,255,255,0.04);

  }
  .stat-number {
    display: block;
    font-size: 26px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
  }

  .home-resume-label {
    font-size: 12px;

  }

    display: flex; align-items: center;
    gap: 12px;
    background: rgba(56,189,248,0.06);

    border-radius: 12px;

    cursor: pointer;
  }
  .resume-icon { font-size: 22px; }

  }

  .complete-screen {

  @keyframes fall { to { transform: translateY(720px) rotate(540deg); opacity: 0; } }

    padding: 12px;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

<script>
const STORE_KEY = "quizfeed:data:v1";
const PROGRESS_KEY = "quizfeed:progress:v1";
const SOUND_KEY = "quizfeed:sound:v1";
const STREAK_KEY = "quizfeed:streak:v1";
const THEME_KEY = "quizfeed:theme:v1";
const STUDY_MODE_KEY = "quizfeed:studymode:v1";

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}
function saveJSON(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    return true;
  } catch (e) {
    alert("⚠️ Không thể lưu dữ liệu! Bộ nhớ trình duyệt đã đầy. Hãy xuất tiến độ để backup, sau đó xóa bớt dữ liệu cũ.");
    return false;
  }
}

/* ---- Fisher-Yates shuffle (thuần, không dùng sort(random)) ---- */
function shuffleArray(arr) {
  const shuffled = arr.slice();
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = shuffled[i];
    shuffled[i] = shuffled[j];
    shuffled[j] = tmp;
  }
  return shuffled;
}

/* ---- Xáo trộn options của 1 câu hỏi, giữ nguyên id và cập nhật answer ---- */
function shuffleQuestion(q) {
  const type = q.type || "mcq";
  if (type !== "mcq") {
    // Các loại câu hỏi mới (fill_blank, true_false, matching) không xáo trộn nội bộ,
    // chỉ giữ nguyên cấu trúc (thứ tự câu hỏi tổng thể vẫn được xáo trộn ở cấp chapter).
    const copy = {};
    for (const key in q) { copy[key] = q[key]; }
    return copy;
  }
  const options = q.options.slice();
  const answer = q.answer;
  const indexed = options.map(function(opt, idx) { return { idx: idx, value: opt }; });
  const shuffled = shuffleArray(indexed);
  const newAnswer = shuffled.findIndex(function(item) { return item.idx === answer; });
  const newQ = {};
  for (const key in q) { newQ[key] = q[key]; }
  newQ.options = shuffled.map(function(item) { return item.value; });
  newQ.answer = newAnswer;
  newQ.originalAnswerIndex = answer;
  return newQ;
}

let subjects = loadJSON(STORE_KEY, []);
let progress = loadJSON(PROGRESS_KEY, {});
let soundOn = loadJSON(SOUND_KEY, true);
let streak = loadJSON(STREAK_KEY, { lastActiveDate: null, currentStreak: 0, maxStreak: 0 });
if (streak.maxStreak === undefined) {
  streak.maxStreak = streak.currentStreak || 0;
  saveJSON(STREAK_KEY, streak);
}

/* ---- Date helpers (YYYY-MM-DD, local time) ---- */
function pad2(n) { return n < 10 ? "0" + n : "" + n; }
function dateToStr(d) { return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
function todayStr() { return dateToStr(new Date()); }
function addDaysToDateStr(dateStr, days) {
  const parts = dateStr.split("-");
  const d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
  d.setDate(d.getDate() + days);
  return dateToStr(d);
}

/* ---- Migration: old progress format { done, correct, total } -> new format with history + wrongIds ---- */
(function migrateProgress() {
  let changed = false;
  Object.keys(progress).forEach(function(chId) {
    const p = progress[chId];
    if (p.correct !== undefined && p.total !== undefined && !p.history) {
      const wasDone = p.done !== undefined ? p.done : true;
      progress[chId] = {
        history: wasDone ? [{ date: Date.now(), correct: p.correct, total: p.total }] : [],
        wrongIds: [],
        bestPct: p.total ? Math.round((p.correct / p.total) * 100) : 0,
        reviewQueue: []
      };
      changed = true;
    } else if (!p.history) {
      // No old-format fields at all; just ensure new fields exist
      progress[chId] = {
        history: p.history || [],
        wrongIds: p.wrongIds || [],
        bestPct: p.bestPct || 0,
        reviewQueue: p.reviewQueue || []
      };
      changed = true;
    }
  });
  if (changed) saveJSON(PROGRESS_KEY, progress);
})();

/* ---- Đảm bảo mọi câu hỏi đã có id ổn định (subjectId-chapterId-index) ---- */
function ensureQuestionIds() {
  let changed = false;
  subjects.forEach(function(subj) {
    subj.chapters.forEach(function(ch) {
      if (!ch.questions) return;
      ch.questions.forEach(function(q, idx) {
        if (!q.id) {
          q.id = subj.id + "-" + ch.id + "-" + idx;
          changed = true;
        }
      });
    });
  });
  if (changed) saveJSON(STORE_KEY, subjects);
}

/* ---- Migration: wrongIds dạng mảng số (index) -> mảng questionId (string) ---- */
(function migrateWrongIdsToQuestionIds() {
  let changed = false;
  Object.keys(progress).forEach(function(chId) {
    const p = progress[chId];
    if (!p || !p.wrongIds || p.wrongIds.length === 0) return;
    const isOldFormat = p.wrongIds.some(function(w) { return typeof w === "number"; });
    if (!isOldFormat) return;

    // Tìm chapter tương ứng trong subjects để ánh xạ index -> questionId
    let foundCh = null;
    subjects.forEach(function(subj) {
      const ch = subj.chapters.find(function(c) { return c.id === chId; });
      if (ch) foundCh = ch;
    });

    const newWrongIds = [];
    p.wrongIds.forEach(function(w) {
      if (typeof w === "string") {
        newWrongIds.push(w);
        return;
      }
      if (foundCh && foundCh.questions && w >= 0 && w < foundCh.questions.length) {
        const q = foundCh.questions[w];
        if (q && q.id) newWrongIds.push(q.id);
        // Nếu không tìm thấy câu hỏi tương ứng (đã sửa file JSON), bỏ qua wrongId đó.
      }
      // Nếu không tìm thấy chapter, bỏ qua wrongId đó.
    });
    p.wrongIds = newWrongIds;
    changed = true;
  });
  if (changed) saveJSON(PROGRESS_KEY, progress);
})();

/* ---- Migration: đảm bảo mọi chapter trong progress có reviewQueue ---- */
(function migrateReviewQueue() {
  let changed = false;
  Object.keys(progress).forEach(function(chId) {
    const p = progress[chId];
    if (p && !p.reviewQueue) {
      p.reviewQueue = [];
      changed = true;
    }
  });
  if (changed) saveJSON(PROGRESS_KEY, progress);
})();

/* ---- TÍNH NĂNG 3: Âm thanh phản hồi ---- */
function playSound(type) {
  if (!soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (type === "correct") {
      osc.frequency.value = 880; // A5
      osc.type = "sine";
      gain.gain.value = 0.15;
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.15);
    } else if (type === "wrong") {
      osc.frequency.value = 330; // E4
      osc.type = "sawtooth";
      gain.gain.value = 0.08;
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    }
  } catch (e) { /* fallback im lặng nếu Web Audio không hỗ trợ */ }
}

function updateStreak() {
  const today = todayStr();
  if (streak.lastActiveDate === today) return; // đã học hôm nay rồi
  const yesterday = addDaysToDateStr(today, -1);
  if (streak.lastActiveDate === yesterday) {
    streak.currentStreak = (streak.currentStreak || 0) + 1;
  } else {
    streak.currentStreak = 1;
  }
  streak.maxStreak = Math.max(streak.maxStreak || 0, streak.currentStreak);
  streak.lastActiveDate = today;
  saveJSON(STREAK_KEY, streak);
}

/* ---- TÍNH NĂNG 2: Spaced Repetition (Leitner) ---- */
function reviewDaysForLevel(level) {
  if (level === 1) return 3;
  if (level >= 2) return 7;
  return 1;
}
function updateReviewQueueForAnswer(chapterId, questionId, isCorrect) {
  if (!chapterId) return;
  if (!progress[chapterId]) progress[chapterId] = { history: [], wrongIds: [], bestPct: 0, reviewQueue: [] };
  if (!progress[chapterId].reviewQueue) progress[chapterId].reviewQueue = [];
  const queue = progress[chapterId].reviewQueue;
  const today = todayStr();
  const existingIdx = queue.findIndex(function(item) { return item.questionId === questionId; });
  if (isCorrect) {
    if (existingIdx >= 0) {
      const item = queue[existingIdx];
      item.level = Math.min((item.level || 0) + 1, 2);
      item.nextReviewDate = addDaysToDateStr(today, reviewDaysForLevel(item.level));
    } else {
      queue.push({ questionId: questionId, level: 0, nextReviewDate: addDaysToDateStr(today, 3) });
    }
  } else {
    if (existingIdx >= 0) {
      queue[existingIdx].level = 0;
      queue[existingIdx].nextReviewDate = addDaysToDateStr(today, 1);
    } else {
      queue.push({ questionId: questionId, level: 0, nextReviewDate: addDaysToDateStr(today, 1) });
    }
  }
  saveJSON(PROGRESS_KEY, progress);
}
function getDueReviewItems() {
  const today = todayStr();
  const items = [];
  subjects.forEach(function(subj) {
    subj.chapters.forEach(function(ch) {
      const p = progress[ch.id];
      if (!p || !p.reviewQueue) return;
      p.reviewQueue.forEach(function(item) {
        if (item.nextReviewDate <= today) {
          const q = ch.questions.find(function(qq) { return qq.id === item.questionId; });
          if (q) items.push({ q: q, chapterId: ch.id, questionId: item.questionId });
        }
      });
    });
  });
  return items;
}
function getDueReviewCount() {
  return getDueReviewItems().length;
}

function chapterStatus(chId) {
  const p = progress[chId];
  if (!p) return { label: "", cls: "" };
  const done = p.done !== undefined ? p.done : (p.history && p.history.length > 0);
  if (done) {
    const last = p.history && p.history.length > 0 ? p.history[p.history.length - 1] : null;
    if (last) return { label: last.correct + "/" + last.total, cls: "done" };
    if (p.correct !== undefined && p.total !== undefined) return { label: p.correct + "/" + p.total, cls: "done" };
    return { label: "đã làm", cls: "done" };
  }
  return { label: "đang làm", cls: "" };
}

function isSameDay(ts1, ts2) {
  const d1 = new Date(ts1);
  const d2 = new Date(ts2);
  return d1.getFullYear() === d2.getFullYear() &&
    d1.getMonth() === d2.getMonth() &&
    d1.getDate() === d2.getDate();
}

function findSubjectChapterMeta(chapterId) {
  let result = null;
  subjects.forEach(function(subj) {
    const ch = subj.chapters.find(function(c) { return c.id === chapterId; });
    if (ch) {
      result = { subjectId: subj.id, chapterId: ch.id, subjectName: subj.name, chapterName: ch.name, subjectIcon: subj.icon || "📘" };
    }
  });
  return result;
}

function getTodayStats() {
  const now = Date.now();
  let correct = 0;
  let total = 0;
  Object.keys(progress).forEach(function(chId) {
    const p = progress[chId];
    if (!p || !p.history) return;
    p.history.forEach(function(h) {
      if (isSameDay(h.date, now)) {
        correct += h.correct;
        total += h.total;
      }
    });
  });
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  return { correct: correct, total: total, pct: pct };
}

function getResumeChapter() {
  let best = null;
  let bestDate = -1;
  Object.keys(progress).forEach(function(chId) {
    const p = progress[chId];
    if (!p || !p.history || p.history.length === 0) return;
    const lastEntry = p.history[p.history.length - 1];
    if (lastEntry.date > bestDate) {
      bestDate = lastEntry.date;
      best = { chapterId: chId, lastEntry: lastEntry };
    }
  });
  if (!best) return null;
  const meta = findSubjectChapterMeta(best.chapterId);
  if (!meta) return null;
  const pct = best.lastEntry.total > 0 ? Math.round((best.lastEntry.correct / best.lastEntry.total) * 100) : 0;
  return {
    subjectId: meta.subjectId, chapterId: meta.chapterId,
    subjectName: meta.subjectName, chapterName: meta.chapterName,
    subjectIcon: meta.subjectIcon, pct: pct, date: bestDate
  };
}

function getRecentChapters(limit, excludeChapterId) {
  limit = limit || 3;
  const items = [];
  Object.keys(progress).forEach(function(chId) {
    if (chId === excludeChapterId) return;
    const p = progress[chId];
    if (!p || !p.history || p.history.length === 0) return;
    const lastEntry = p.history[p.history.length - 1];
    const meta = findSubjectChapterMeta(chId);
    if (!meta) return;
    const pct = lastEntry.total > 0 ? Math.round((lastEntry.correct / lastEntry.total) * 100) : 0;
    items.push({
      subjectId: meta.subjectId, chapterId: meta.chapterId,
      subjectName: meta.subjectName, chapterName: meta.chapterName,
      subjectIcon: meta.subjectIcon, pct: pct, date: lastEntry.date
    });
  });
  items.sort(function(a, b) { return b.date - a.date; });
  return items.slice(0, limit);
}

    block.className = "subject-block";

    const row = document.createElement("div");
    row.className = "subject-row";
    const isOpen = openSubjectId === subj.id;
    row.innerHTML =
      '<span class="subject-icon">' + escapeHtml(subj.icon || "📘") + '</span>' +
      '<span class="subject-name">' + escapeHtml(subj.name) + '</span>' +
      '<span class="subject-meta">' + subj.chapters.length + ' chương</span>' +
      '<span class="subject-chevron' + (isOpen ? " open" : "") + '">&rsaquo;</span>';
    row.onclick = () => { openSubjectId = isOpen ? null : subj.id; renderDrawer(); };
    block.appendChild(row);

    const list = document.createElement("div");
    list.className = "chapter-list" + (isOpen ? " open" : "");
    subj.chapters.forEach((ch) => {
      const st = chapterStatus(ch.id);
      const p = progress[ch.id];
      const wrongCount = p && p.wrongIds ? p.wrongIds.length : 0;
      const crow = document.createElement("div");
      crow.className = "chapter-row";
      const isChecked = !!selectedChapters[ch.id];
      crow.innerHTML =
        '<input type="checkbox" class="chapter-checkbox" data-ch="' + ch.id + '"' + (isChecked ? " checked" : "") + ' />' +
        '<span class="chapter-name" style="flex:1">' + escapeHtml(ch.name) + '</span>' +
        '<span class="chapter-row-right">' +
        (wrongCount > 0 ? '<button class="wrong-review-btn" data-subj="' + subj.id + '" data-ch="' + ch.id + '">Ôn sai (' + wrongCount + ')</button>' : '') +
        '<span class="chapter-progress ' + st.cls + '">' + st.label + '</span>' +
        '</span>';
      crow.onclick = (ev) => {
        if (ev.target.closest(".wrong-review-btn")) return;
        if (ev.target.closest(".chapter-checkbox")) return;
        startChapter(subj.id, ch.id); closeDrawer();
      };
      const wbtn = crow.querySelector(".wrong-review-btn");
      if (wbtn) {
        wbtn.onclick = (ev) => {
          ev.stopPropagation();
          startWrongQuiz(subj.id, ch.id);
          closeDrawer();
        };
      }
      const cbox = crow.querySelector(".chapter-checkbox");
      cbox.onclick = (ev) => { ev.stopPropagation(); };
      cbox.onchange = (ev) => {
        if (ev.target.checked) selectedChapters[ch.id] = true;
        else delete selectedChapters[ch.id];
        updateCombinedTestBtn();
      };
      list.appendChild(crow);
    });
    block.appendChild(list);
    drawerBody.appendChild(block);
  });
  updateCombinedTestBtn();
}

function updateCombinedTestBtn() {
  const count = Object.keys(selectedChapters).length;
  combinedTestBtn.classList.toggle("show", count > 0);
  combinedTestBtn.textContent = count > 0 ? "📝 Test tổng hợp (" + count + " chương)" : "📝 Test tổng hợp";

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}

function validateImportedData(data) {
  const errors = [];

  if (data === null || typeof data !== "object") {
    errors.push("Dữ liệu không phải là object hoặc mảng hợp lệ.");
    return { valid: false, errors: errors };
  }

  let incoming = [];
  if (Array.isArray(data)) {
    incoming = data;
  } else if (data.subjects !== undefined) {
    if (!Array.isArray(data.subjects)) {
      errors.push("Trường 'subjects' phải là một mảng.");
      return { valid: false, errors: errors };
    }
    incoming = data.subjects;
  } else if (data.name !== undefined && data.chapters !== undefined) {
    incoming = [data];
  } else {
    errors.push("Không nhận diện được cấu trúc dữ liệu. Cần có 'subjects' (mảng), hoặc là một mảng subjects, hoặc một subject đơn có 'name' và 'chapters'.");
    return { valid: false, errors: errors };
  }

  if (incoming.length === 0) {
    errors.push("Không tìm thấy subject nào trong dữ liệu.");
    return { valid: false, errors: errors };
  }

  incoming.forEach(function(subj, sIdx) {
    const subjLabel = "Subject #" + (sIdx + 1);

    if (subj === null || typeof subj !== "object") {
      errors.push(subjLabel + " không phải là một object hợp lệ.");
      return;
    }

    let subjName = subj.name;
    if (typeof subjName !== "string" || subjName.trim() === "") {
      errors.push(subjLabel + " thiếu 'name' hoặc 'name' không phải là string.");
      subjName = subjLabel;
    }

    if (!Array.isArray(subj.chapters)) {
      errors.push("Subject '" + subjName + "' thiếu 'chapters' hoặc 'chapters' không phải là mảng.");
      return;
    }

    if (subj.chapters.length === 0) {
      errors.push("Subject '" + subjName + "' không có chapter nào.");
    }

    subj.chapters.forEach(function(ch, cIdx) {
      const chPos = "chapter #" + (cIdx + 1);

      if (ch === null || typeof ch !== "object") {
        errors.push("Subject '" + subjName + "' có " + chPos + " không phải là object hợp lệ.");
        return;
      }

      let chName = ch.name;
      if (typeof chName !== "string" || chName.trim() === "") {
        errors.push("Subject '" + subjName + "' có 1 chapter thiếu name (" + chPos + ").");
        chName = chPos;
      }

      if (!Array.isArray(ch.questions)) {
        errors.push("Chapter '" + chName + "' trong subject '" + subjName + "' thiếu 'questions' hoặc 'questions' không phải là mảng.");
        return;
      }

      if (ch.questions.length === 0) {
        errors.push("Chapter '" + chName + "' trong subject '" + subjName + "' không có câu hỏi nào.");
      }

      ch.questions.forEach(function(q, qIdx) {
        const qNum = qIdx + 1;

        if (q === null || typeof q !== "object") {
          errors.push("Chapter '" + chName + "' trong subject '" + subjName + "' có câu hỏi #" + qNum + " không phải là object hợp lệ.");
          return;
        }

        const qType = q.type || "mcq";
        const qLoc = "Chapter '" + chName + "' trong subject '" + subjName + "' có câu hỏi #" + qNum;

        if (typeof q.q !== "string" || q.q.trim() === "") {
          errors.push(qLoc + " thiếu nội dung 'q' hoặc 'q' rỗng.");
        }

        if (qType === "mcq") {
          if (!Array.isArray(q.options)) {
            errors.push(qLoc + " thiếu options.");
          } else {
            if (q.options.length < 2) {
              errors.push(qLoc + " có ít hơn 2 options.");
            }
            q.options.forEach(function(opt, oIdx) {
              if (typeof opt !== "string") {
                errors.push(qLoc + " có option #" + (oIdx + 1) + " không phải là string.");
              }
            });
          }

          if (typeof q.answer !== "number" || !Number.isInteger(q.answer)) {
            errors.push(qLoc + " thiếu 'answer' hoặc 'answer' không phải là số nguyên.");
          } else if (Array.isArray(q.options)) {
            if (q.answer < 0 || q.answer > q.options.length - 1) {
              errors.push(qLoc + " có answer = " + q.answer + " nhưng chỉ có " + q.options.length + " options.");
            }
          }
        } else if (qType === "fill_blank") {
          if (typeof q.answer !== "string" || q.answer.trim() === "") {
            errors.push(qLoc + " (fill_blank) thiếu 'answer' hoặc 'answer' không phải là string.");
          }
        } else if (qType === "true_false") {
          if (typeof q.answer !== "boolean") {
            errors.push(qLoc + " (true_false) thiếu 'answer' hoặc 'answer' không phải là boolean (true/false).");
          }
        } else if (qType === "matching") {
          if (!Array.isArray(q.pairs) || q.pairs.length < 2) {
            errors.push(qLoc + " (matching) thiếu 'pairs' hoặc 'pairs' có ít hơn 2 cặp.");
          } else {
            q.pairs.forEach(function(pair, pIdx) {
              if (!pair || typeof pair.left !== "string" || typeof pair.right !== "string") {
                errors.push(qLoc + " (matching) có cặp #" + (pIdx + 1) + " thiếu 'left' hoặc 'right'.");
              }
            });
          }
          if (!q.answer || typeof q.answer !== "object" || Array.isArray(q.answer)) {
            errors.push(qLoc + " (matching) thiếu 'answer' hoặc 'answer' không phải là object mapping.");
          }
        } else {
          errors.push(qLoc + " có type '" + qType + "' không được hỗ trợ.");
        }

        if (q.explain !== undefined && typeof q.explain !== "string") {
          errors.push(qLoc + " có 'explain' nhưng không phải là string.");
        }
      });
    });
  });

  if (errors.length > 0) {
    return { valid: false, errors: errors };
  }
  return { valid: true };
}

function mergeImportedData(data) {
  let incoming = [];
  if (Array.isArray(data)) incoming = data;
  else if (data.subjects) incoming = data.subjects;
  else if (data.name && data.chapters) incoming = [data];

  incoming.forEach(function(newSubj) {
    if (!newSubj.id) newSubj.id = slugify(newSubj.name);
    const existing = subjects.find(function(s) { return s.id === newSubj.id; });
    if (existing) {
      newSubj.chapters.forEach(function(newCh) {
        if (!newCh.id) newCh.id = newSubj.id + "-" + slugify(newCh.name);
        newCh.questions.forEach(function(q, idx) {
          if (!q.id) q.id = newSubj.id + "-" + newCh.id + "-" + idx;
        });
        const idx = existing.chapters.findIndex(function(c) { return c.id === newCh.id; });
        if (idx >= 0) existing.chapters[idx] = newCh;
        else existing.chapters.push(newCh);
      });
    } else {
      newSubj.chapters.forEach(function(ch) {
        if (!ch.id) ch.id = newSubj.id + "-" + slugify(ch.name);
        ch.questions.forEach(function(q, idx) {
          if (!q.id) q.id = newSubj.id + "-" + ch.id + "-" + idx;
        });
      });
      subjects.push(newSubj);
    }
  });
}

function slugify(s) {
  return String(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
}

async function startChapter(subjectId, chapterId) {
  const subj = subjects.find(function(s) { return s.id === subjectId; });
  const ch = subj.chapters.find(function(c) { return c.id === chapterId; });
  if (!ch || !ch.questions || ch.questions.length === 0) {
    await customAlert("Thông báo", "Chương này chưa có câu hỏi.", "⚠️");
    return;
  }
  const indexedQuestions = ch.questions.map(function(q, idx) { return { q: q, originalIndex: idx }; });
  const shuffledIndexed = shuffleArray(indexedQuestions);
  const shuffledQuestions = shuffledIndexed.map(function(item) { return shuffleQuestion(item.q); });
  const originalIndices = shuffledIndexed.map(function(item) { return item.originalIndex; });

  currentChapter = {
    subjectId: subjectId, chapterId: chapterId, subjectName: subj.name, chapterName: ch.name,
    questions: shuffledQuestions, originalIndices: originalIndices,
    index: 0, correctCount: 0, comboCount: 0, answered: false, results: []
  };
  homeScreen.classList.add("hidden");
  completeScreen.classList.remove("active");
  quizScreen.classList.add("active");
  topTitle.textContent = subj.name;
  renderQuestion();
}

async function startWrongQuiz(subjectId, chapterId) {
  const subj = subjects.find(function(s) { return s.id === subjectId; });
  const ch = subj.chapters.find(function(c) { return c.id === chapterId; });
  if (!ch || !ch.questions) {
    await customAlert("Thông báo", "Chương này chưa có câu hỏi.", "⚠️");
    return;
  }
  const p = progress[chapterId];
  const wrongIds = p && p.wrongIds ? p.wrongIds : [];
  const wrongQuestions = wrongIds
    .map(function(qid) { return ch.questions.find(function(q) { return q.id === qid; }); })
    .filter(function(q) { return !!q; });

  if (wrongQuestions.length === 0) {
    await customAlert("Ôn câu sai", "Không có câu sai nào để ôn", "✅");
    return;
  }

  const indexedQuestions = wrongQuestions.map(function(q) { return { q: q, originalQuestionId: q.id }; });
  const shuffledIndexed = shuffleArray(indexedQuestions);
  const shuffledQuestions = shuffledIndexed.map(function(item) { return shuffleQuestion(item.q); });
  const originalQuestionIds = shuffledIndexed.map(function(item) { return item.originalQuestionId; });

  currentChapter = {
    subjectId: subjectId, chapterId: chapterId, subjectName: subj.name, chapterName: ch.name,
    questions: shuffledQuestions, originalQuestionIds: originalQuestionIds,
    index: 0, correctCount: 0, comboCount: 0, answered: false, results: [],
    isWrongQuiz: true, originalChapterId: chapterId
  };
  homeScreen.classList.add("hidden");
  completeScreen.classList.remove("active");
  quizScreen.classList.add("active");
  topTitle.textContent = subj.name + " (Ôn câu sai)";
  renderQuestion();
}

async function startCombinedTest(chapterIds) {
  lastCombinedChapterIds = chapterIds.slice();
  const items = []; // { q, chapterId }
  chapterIds.forEach(function(chId) {
    subjects.forEach(function(subj) {
      const ch = subj.chapters.find(function(c) { return c.id === chId; });
      if (ch && ch.questions) {
        ch.questions.forEach(function(q) {
          items.push({ q: q, chapterId: ch.id });
        });
      }
    });
  });
  if (items.length === 0) {
    await customAlert("Thông báo", "Các chương đã chọn chưa có câu hỏi.", "⚠️");
    return;
  }
  const shuffledItems = shuffleArray(items);
  const shuffledQuestions = shuffledItems.map(function(item) { return shuffleQuestion(item.q); });
  const sourceChapters = shuffledItems.map(function(item) { return item.chapterId; });

  currentChapter = {
    subjectId: null, chapterId: null, subjectName: "Test tổng hợp", chapterName: "Test tổng hợp",
    questions: shuffledQuestions, sourceChapters: sourceChapters,
    index: 0, correctCount: 0, comboCount: 0, answered: false, results: [],
    isCombined: true, combinedChapterIds: chapterIds.slice()
  };
  homeScreen.classList.add("hidden");
  completeScreen.classList.remove("active");
  combinedResultScreen.classList.remove("active");
  quizScreen.classList.add("active");
  topTitle.textContent = "Test tổng hợp";
  renderQuestion();
}

combinedTestBtn.onclick = function() {
  const chapterIds = Object.keys(selectedChapters);
  if (chapterIds.length === 0) return;
  closeDrawer();
  startCombinedTest(chapterIds);
};

function getEffectiveChapterId(cc) {
  return cc.isCombined ? cc.sourceChapters[cc.index] : cc.chapterId;
}

function renderQuestion() {
  const cc = currentChapter;
  const q = cc.questions[cc.index];
  cc.answered = false;
  questionText.textContent = q.q;
  chapterTag.textContent = cc.chapterName + (cc.isWrongQuiz ? " (Ôn câu sai)" : (cc.isReviewQuiz ? " (Ôn tập)" : (cc.isCombined ? " (Tổng hợp)" : "")));
  shuffleIndicator.classList.add("show");
  quizCounter.textContent = (cc.index + 1) + " / " + cc.questions.length;
  progressFill.style.width = (cc.index / cc.questions.length * 100) + "%";
  feedbackBanner.className = "feedback-banner";
  feedbackBanner.textContent = "";
  nextBtn.classList.remove("show");
  comboBadge.classList.toggle("show", cc.comboCount >= 2);
  comboBadge.textContent = "Combo x" + cc.comboCount;
  updateModeToggleBtn();
  updateBookmarkBtn();

  optionsList.innerHTML = "";
  const qType = q.type || "mcq";
  if (qType === "fill_blank") {
    renderFillBlank(q);
  } else if (qType === "true_false") {
    renderTrueFalse(q);
  } else if (qType === "matching") {
    renderMatching(q);
  } else {
    renderMCQ(q);
  }
  typesetMath();

  if (studyMode) revealStudyModeAnswer(q);
}

/* ---- Render: Trắc nghiệm (mcq, mặc định) ---- */
function renderMCQ(q) {
  const letters = ["A", "B", "C", "D", "E", "F"];
  q.options.forEach(function(opt, i) {
    const div = document.createElement("div");
    div.className = "option";
    div.innerHTML = '<span class="option-letter">' + letters[i] + '</span><span>' + escapeHtml(opt) + '</span>';
    div.onclick = function() { handleAnswer(i); };
    optionsList.appendChild(div);
  });
}

/* ---- Render: Điền khuyết (fill_blank) ---- */
function renderFillBlank(q) {
  const wrap = document.createElement("div");
  wrap.className = "fill-blank-wrap";
  wrap.innerHTML =
    '<input type="text" id="fillBlankInput" class="fill-blank-input" placeholder="Nhập câu trả lời..." autocomplete="off" autocapitalize="off" />' +
    '<button class="fill-blank-submit" id="fillBlankSubmitBtn">Kiểm tra</button>' +
    '<div class="fill-blank-correct" id="fillBlankCorrectAnswer" style="display:none"></div>';
  optionsList.appendChild(wrap);
  const inputEl = $("fillBlankInput");
  $("fillBlankSubmitBtn").onclick = handleFillBlankSubmit;
  inputEl.onkeydown = function(ev) { if (ev.key === "Enter") handleFillBlankSubmit(); };
  setTimeout(function() { inputEl.focus(); }, 60);
}

/* ---- Render: Đúng/Sai (true_false) ---- */
function renderTrueFalse(q) {
  const wrap = document.createElement("div");
  wrap.className = "tf-wrap";
  wrap.innerHTML =
    '<button class="tf-btn" id="tfTrueBtn">👍 Đúng</button>' +
    '<button class="tf-btn" id="tfFalseBtn">👎 Sai</button>';
  optionsList.appendChild(wrap);
  $("tfTrueBtn").onclick = function() { handleTrueFalse(true); };
  $("tfFalseBtn").onclick = function() { handleTrueFalse(false); };
}

/* ---- Render: Ghép đôi (matching) ---- */
let matchingState = null;

function renderMatching(q) {
  const wrap = document.createElement("div");
  wrap.className = "matching-wrap";

  const leftTexts = q.pairs.map(function(p) { return p.left; });
  const rightTexts = q.pairs.map(function(p) { return p.right; });
  const leftOrder = shuffleArray(leftTexts.map(function(t, i) { return i; }));
  const rightOrder = shuffleArray(rightTexts.map(function(t, i) { return i; }));

  matchingState = {
    q: q,
    leftTexts: leftTexts,
    rightTexts: rightTexts,
    leftOrder: leftOrder,
    rightOrder: rightOrder,
    mapping: {},        // leftIdx (gốc) -> rightIdx (gốc)
    selectedLeft: null,
    finalized: false,
    leftEls: {},         // leftIdx (gốc) -> { root, hintEl }
    rightEls: {}          // rightIdx (gốc) -> { root, hintEl }
  };

  const columns = document.createElement("div");
  columns.className = "matching-columns";

  const leftCol = document.createElement("div");
  leftCol.className = "matching-col";
  leftCol.innerHTML = '<div class="matching-col-label">CỘT A</div>';
  const leftLetters = ["A", "B", "C", "D", "E", "F", "G", "H"];
  leftOrder.forEach(function(leftIdx) {
    const item = document.createElement("div");
    item.className = "matching-item";

    const badge = document.createElement("span");
    badge.className = "matching-badge";
    badge.textContent = leftLetters[leftIdx];

    // Nội dung gốc (có thể chứa \(...\) hoặc \[...\] của MathJax) chỉ được
    // gán 1 lần duy nhất tại đây, dùng textContent để MathJax quét được cú
    // pháp LaTeX nguyên vẹn. Không rebuild lại span này ở redrawMatching().
    const textSpan = document.createElement("span");
    textSpan.className = "matching-item-text";
    textSpan.textContent = leftTexts[leftIdx];

    const hintSpan = document.createElement("span");
    hintSpan.className = "matching-item-hint";
    hintSpan.style.display = "none";
    textSpan.appendChild(hintSpan);

    item.appendChild(badge);
    item.appendChild(textSpan);
    item.onclick = function() { onMatchingLeftClick(leftIdx); };
    leftCol.appendChild(item);
    matchingState.leftEls[leftIdx] = { root: item, hintEl: hintSpan };
  });

  const rightCol = document.createElement("div");
  rightCol.className = "matching-col";
  rightCol.innerHTML = '<div class="matching-col-label">CỘT B</div>';
  rightOrder.forEach(function(rightIdx) {
    const item = document.createElement("div");
    item.className = "matching-item";

    const badge = document.createElement("span");
    badge.className = "matching-badge";
    badge.textContent = String(rightIdx + 1);

    const textSpan = document.createElement("span");
    textSpan.className = "matching-item-text";
    textSpan.textContent = rightTexts[rightIdx];

    const hintSpan = document.createElement("span");
    hintSpan.className = "matching-item-hint";
    hintSpan.style.display = "none";
    textSpan.appendChild(hintSpan);

    item.appendChild(badge);
    item.appendChild(textSpan);
    item.onclick = function() { onMatchingRightClick(rightIdx); };
    rightCol.appendChild(item);
    matchingState.rightEls[rightIdx] = { root: item, hintEl: hintSpan };
  });

  columns.appendChild(leftCol);
  columns.appendChild(rightCol);
  wrap.appendChild(columns);

  const hintText = document.createElement("div");
  hintText.className = "matching-hint-text";
  hintText.id = "matchingHintText";
  hintText.textContent = "Chạm 1 mục ở Cột A, rồi chạm mục tương ứng ở Cột B.";
  wrap.appendChild(hintText);

  const submitBtn = document.createElement("button");
  submitBtn.className = "matching-submit";
  submitBtn.id = "matchingSubmitBtn";
  submitBtn.textContent = "Kiểm tra";
  submitBtn.onclick = handleMatchingSubmit;
  wrap.appendChild(submitBtn);

  optionsList.appendChild(wrap);
  redrawMatching();
}

/* Kiểm tra xem cặp (leftIdx, rightIdx) đã ghép có đúng với answer hay không */
function isMatchingPairCorrect(leftIdx, rightIdx) {
  const ms = matchingState;
  return ms.q.answer[leftIdx] === rightIdx;
}

/* Tìm leftIdx đang được ghép (đúng hoặc sai) với 1 rightIdx cho trước, trả về null nếu không có */
function findLeftMappedTo(rightIdx) {
  const ms = matchingState;
  const keys = Object.keys(ms.mapping);
  for (let k = 0; k < keys.length; k++) {
    const li = keys[k];
    if (ms.mapping[li] === rightIdx) return li;
  }
  return null;
}

function onMatchingLeftClick(leftIdx) {
  const ms = matchingState;
  if (!ms || ms.finalized) return;
  const existing = ms.mapping[leftIdx];
  if (existing !== undefined) {
    if (isMatchingPairCorrect(leftIdx, existing)) return; // Cặp đúng: khóa, không cho sửa
    delete ms.mapping[leftIdx];
    ms.selectedLeft = (ms.selectedLeft === leftIdx) ? null : leftIdx;
    redrawMatching();
    return;
  }
  ms.selectedLeft = (ms.selectedLeft === leftIdx) ? null : leftIdx;
  redrawMatching();
}

function onMatchingRightClick(rightIdx) {
  const ms = matchingState;
  if (!ms || ms.finalized) return;

  const correctOwner = findLeftMappedTo(rightIdx);
  if (correctOwner !== null && isMatchingPairCorrect(correctOwner, rightIdx)) return; // Đã ghép đúng: khóa

  if (ms.selectedLeft !== null) {
    // Nếu right này đang giữ 1 cặp sai của left khác, bỏ cặp đó trước khi ghép mới
    const wrongOwner = findLeftMappedTo(rightIdx);
    if (wrongOwner !== null) delete ms.mapping[wrongOwner];
    ms.mapping[ms.selectedLeft] = rightIdx;
    ms.selectedLeft = null;
    redrawMatching();
    return;
  }

  // Chưa chọn Cột A: nếu right này đang ghép sai với 1 left, cho phép hủy ghép để làm lại
  const wrongOwner = findLeftMappedTo(rightIdx);
  if (wrongOwner !== null) {
    delete ms.mapping[wrongOwner];
    ms.selectedLeft = wrongOwner;
    redrawMatching();
  }
}

/* Vẽ lại toàn bộ trạng thái 2 cột dựa trên matchingState.
   Chỉ thay đổi class (trạng thái) và nội dung ô hint — KHÔNG rebuild lại
   span nội dung gốc (.matching-item-text), để không phá công thức MathJax
   đã được render. Sau khi cập nhật xong, gọi typesetMath() để MathJax xử lý
   phần hint mới (nếu hint có chứa công thức) mà không đụng tới phần đã
   render trước đó. */
function redrawMatching() {
  const ms = matchingState;
  if (!ms) return;

  Object.keys(ms.leftEls).forEach(function(key) {
    const leftIdx = parseInt(key, 10);
    const ref = ms.leftEls[leftIdx];
    const el = ref.root;
    el.className = "matching-item";
    let hint = "";
    const mapped = ms.mapping[leftIdx];
    if (mapped !== undefined) {
      const ok = isMatchingPairCorrect(leftIdx, mapped);
      el.classList.add(ok ? "matched-correct" : "matched-wrong");
      if (ok) el.classList.add("locked");
      hint = (ok ? "✓ " : "✗ ") + ms.rightTexts[mapped];
    } else if (ms.selectedLeft === leftIdx) {
      el.classList.add("selected");
    }
    if (ms.finalized) el.classList.add("locked");
    if (ref.hintEl.textContent !== hint) ref.hintEl.textContent = hint;
    ref.hintEl.style.display = hint ? "" : "none";
  });

  Object.keys(ms.rightEls).forEach(function(key) {
    const rightIdx = parseInt(key, 10);
    const ref = ms.rightEls[rightIdx];
    const el = ref.root;
    el.className = "matching-item";
    let hint = "";
    const ownerLeft = findLeftMappedTo(rightIdx);
    if (ownerLeft !== null) {
      const ok = isMatchingPairCorrect(ownerLeft, rightIdx);
      el.classList.add(ok ? "matched-correct" : "matched-wrong");
      if (ok) el.classList.add("locked");
      hint = (ok ? "✓ " : "✗ ") + ms.leftTexts[ownerLeft];
    }
    if (ms.finalized) el.classList.add("locked");
    if (ref.hintEl.textContent !== hint) ref.hintEl.textContent = hint;
    ref.hintEl.style.display = hint ? "" : "none";
  });

  const hintTextEl = $("matchingHintText");
  const submitBtn = $("matchingSubmitBtn");
  const totalPairs = Object.keys(ms.leftEls).length;
  const matchedCount = Object.keys(ms.mapping).length;
  const allMatched = matchedCount >= totalPairs;

  if (!ms.finalized) {
    if (hintTextEl) {
      if (allMatched) {
        const hasWrong = Object.keys(ms.mapping).some(function(li) {
          return !isMatchingPairCorrect(li, ms.mapping[li]);
        });
        hintTextEl.textContent = hasWrong ? "Còn cặp sai — chạm vào cặp đó để ghép lại, hoặc bấm Kiểm tra." : "Đã ghép hết. Bấm Kiểm tra để hoàn tất.";
      } else if (ms.selectedLeft !== null) {
        hintTextEl.textContent = "Đã chọn " + ["A", "B", "C", "D", "E", "F", "G", "H"][ms.selectedLeft] + " — chạm 1 mục ở Cột B để ghép.";
      } else {
        hintTextEl.textContent = "Chạm 1 mục ở Cột A, rồi chạm mục tương ứng ở Cột B.";
      }
    }
    if (submitBtn) submitBtn.classList.toggle("show", allMatched);
  }

  // Công thức toán (nếu có) trong nội dung gốc chỉ cần MathJax xử lý 1 lần khi
  // tạo phần tử; các lần redraw sau chỉ có ô hint là nội dung mới, nên gọi lại
  // typesetPromise để hint (và mọi công thức chưa xử lý) hiển thị đúng, đồng
  // thời không ảnh hưởng tới phần đã render trước đó.
  typesetMath();
}

/* ---- Bắt đầu chấm điểm: kiểm tra khóa "đã trả lời" chung cho mọi loại câu hỏi ---- */
function beginAnswer() {
  const cc = currentChapter;
  if (cc.answered) return null;
  cc.answered = true;
  return cc;
}
function recordResult(isCorrect) {
  const cc = currentChapter;
  playSound(isCorrect ? "correct" : "wrong");
  if (!cc.results) cc.results = [];
  cc.results[cc.index] = isCorrect;
}

/* ---- Chấm điểm trắc nghiệm (mcq) ---- */
function handleAnswer(selectedIdx) {
  const cc = beginAnswer();
  if (!cc) return;
  const q = cc.questions[cc.index];
  const isCorrect = selectedIdx === q.answer;
  recordResult(isCorrect);
  const allOptions = Array.prototype.slice.call(optionsList.children);
  const letters = ["A", "B", "C", "D", "E", "F"];
  allOptions.forEach(function(opt, i) {
    if (i === q.answer) {
      opt.innerHTML = '<span class="option-letter">✓</span><span>' + escapeHtml(q.options[i]) + '</span>';
      opt.classList.add("correct");
    } else if (i === selectedIdx) {
      opt.innerHTML = '<span class="option-letter">✗</span><span>' + escapeHtml(q.options[i]) + '</span>';
      opt.classList.add("wrong");
    } else {
      opt.innerHTML = '<span class="option-letter">' + letters[i] + '</span><span>' + escapeHtml(q.options[i]) + '</span>';
      opt.classList.add("dim");
    }
  });
  gradeAnswer(isCorrect);
}

/* ---- Chấm điểm điền khuyết (fill_blank) ---- */
function normalizeAnswerStr(s) {
  return String(s || "").trim().toLowerCase().replace(/\s+/g, " ");
}
function handleFillBlankSubmit() {
  const cc = beginAnswer();
  if (!cc) return;
  const q = cc.questions[cc.index];
  const inputEl = $("fillBlankInput");
  const userVal = inputEl ? inputEl.value : "";
  const isCorrect = normalizeAnswerStr(userVal) === normalizeAnswerStr(q.answer);
  recordResult(isCorrect);
  if (inputEl) {
    inputEl.disabled = true;
    inputEl.classList.add(isCorrect ? "correct" : "wrong");
  }
  if (!isCorrect) {
    const correctEl = $("fillBlankCorrectAnswer");
    if (correctEl) {
      correctEl.style.display = "block";
      correctEl.textContent = "Đáp án đúng: " + q.answer;
    }
  }
  const submitBtn = $("fillBlankSubmitBtn");
  if (submitBtn) submitBtn.style.display = "none";
  gradeAnswer(isCorrect);
}

/* ---- Chấm điểm đúng/sai (true_false) ---- */
function handleTrueFalse(selectedBool) {
  const cc = beginAnswer();
  if (!cc) return;
  const q = cc.questions[cc.index];
  const correctBool = !!q.answer;
  const isCorrect = selectedBool === correctBool;
  recordResult(isCorrect);
  const trueBtn = $("tfTrueBtn"), falseBtn = $("tfFalseBtn");
  [{ btn: trueBtn, val: true }, { btn: falseBtn, val: false }].forEach(function(item) {
    if (item.val === correctBool) {
      item.btn.classList.add("correct");
    } else if (item.val === selectedBool) {
      item.btn.classList.add("wrong");
    } else {
      item.btn.classList.add("dim");
    }
    item.btn.disabled = true;
  });
  gradeAnswer(isCorrect);
}

/* ---- Chấm điểm ghép đôi (matching) ---- */
function handleMatchingSubmit() {
  const cc = beginAnswer();
  if (!cc) return;
  const ms = matchingState;
  let allCorrect = ms ? Object.keys(ms.leftEls).length > 0 : false;
  if (ms) {
    ms.finalized = true;
    ms.selectedLeft = null;
    Object.keys(ms.leftEls).forEach(function(key) {
      const leftIdx = parseInt(key, 10);
      const mapped = ms.mapping[leftIdx];
      const isRowCorrect = mapped !== undefined && isMatchingPairCorrect(leftIdx, mapped);
      if (!isRowCorrect) allCorrect = false;
    });
    redrawMatching();
    const hintTextEl = $("matchingHintText");
    if (hintTextEl) hintTextEl.textContent = allCorrect ? "Chính xác toàn bộ!" : "Có cặp chưa đúng, đã tô đỏ ở trên.";
  }
  const submitBtn = $("matchingSubmitBtn");
  if (submitBtn) submitBtn.classList.remove("show");
  recordResult(allCorrect);
  gradeAnswer(allCorrect);
}

/* ---- Logic chấm điểm & lưu tiến độ dùng chung cho mọi loại câu hỏi ---- */
function gradeAnswer(isCorrect) {
  const cc = currentChapter;
  const q = cc.questions[cc.index];
  const effectiveChapterId = getEffectiveChapterId(cc);

  if (isCorrect) {
    cc.correctCount++;
    cc.comboCount++;
    flashScreen("correct");
    feedbackBanner.classList.add("correct");
    feedbackBanner.textContent = q.explain ? "Chính xác. " + q.explain : "Chính xác.";
    if (cc.comboCount >= 3) launchConfetti(14);
    comboBadge.textContent = "Combo x" + cc.comboCount;
    comboBadge.classList.toggle("show", cc.comboCount >= 2);

    if (cc.isWrongQuiz) {
      const origQid = cc.originalQuestionIds[cc.index];
      const p = progress[cc.originalChapterId];
      if (p && p.wrongIds) {
        const pos = p.wrongIds.indexOf(origQid);
        if (pos >= 0) {
          p.wrongIds.splice(pos, 1);
          saveJSON(PROGRESS_KEY, progress);
        }
      }
    } else if (!cc.isReviewQuiz) {
      updateReviewQueueForAnswer(effectiveChapterId, q.id, true);
    }
  } else {
    cc.comboCount = 0;
    flashScreen("wrong");
    questionCard.classList.add("shake");
    setTimeout(function() { questionCard.classList.remove("shake"); }, 450);
    feedbackBanner.classList.add("wrong");
    feedbackBanner.textContent = q.explain ? "Chưa đúng. " + q.explain : "Chưa đúng, đáp án đúng đã được tô xanh.";
    comboBadge.classList.remove("show");

    if (!cc.isWrongQuiz && !cc.isReviewQuiz) {
      const chId = effectiveChapterId;
      if (chId) {
        if (!progress[chId]) {
          progress[chId] = { history: [], wrongIds: [], bestPct: 0, reviewQueue: [] };
        }
        if (!progress[chId].wrongIds) progress[chId].wrongIds = [];
        if (progress[chId].wrongIds.indexOf(q.id) === -1) {
          progress[chId].wrongIds.push(q.id);
        }
        saveJSON(PROGRESS_KEY, progress);
        updateReviewQueueForAnswer(chId, q.id, false);
      }
    } else if (cc.isWrongQuiz) {
      // Trong chế độ ôn sai, trả lời sai vẫn giữ questionId trong wrongIds (đã có sẵn)
    }
  }
  feedbackBanner.classList.add("show");
  nextBtn.classList.add("show");
  progressFill.style.width = ((cc.index + 1) / cc.questions.length * 100) + "%";
}

function flashScreen(type) {
  flashOverlay.className = "flash " + type + " show";
  setTimeout(function() { flashOverlay.className = "flash " + type; }, 350);
}

nextBtn.onclick = function() {
  const cc = currentChapter;
  if (cc.index + 1 >= cc.questions.length) {
    finishChapter();
  } else {
    cc.index++;
    renderQuestion();
  }
};

function finishChapter() {
  const cc = currentChapter;

  if (studyMode) {
    quizScreen.classList.remove("active");
    completeScreen.classList.add("active");
    completeEmoji.textContent = "📖";
    completeTitle.textContent = "Đã học xong " + cc.questions.length + " câu";
    completeScore.innerHTML = "Chế độ Học không tính điểm hay lưu tiến độ.";
    return;
  }

  updateStreak();
  updateStreakDisplay();

  if (cc.isCombined) {
    quizScreen.classList.remove("active");
    combinedResultScreen.classList.add("active");

    // Gom kết quả theo từng chapter nguồn
    const byChapter = {}; // chId -> { correct, total }
    cc.sourceChapters.forEach(function(chId, i) {
      if (!byChapter[chId]) byChapter[chId] = { correct: 0, total: 0 };
      byChapter[chId].total++;
      if (cc.results[i]) byChapter[chId].correct++;
    });

    combinedResultTable.innerHTML = "";
    let totalCorrect = 0, totalCount = 0;
    Object.keys(byChapter).forEach(function(chId) {
      const stat = byChapter[chId];
      const meta = findSubjectChapterMeta(chId);
      const label = meta ? (meta.subjectName + " - " + meta.chapterName) : chId;
      const pct = stat.total > 0 ? Math.round((stat.correct / stat.total) * 100) : 0;
      totalCorrect += stat.correct;
      totalCount += stat.total;

      const pctCls = pct >= 80 ? "good" : (pct >= 50 ? "mid" : "bad");
      const row = document.createElement("div");
      row.className = "combined-result-row";
      row.innerHTML =
        '<span>' + escapeHtml(label) + '</span>' +
        '<span class="cr-pct ' + pctCls + '">' + stat.correct + '/' + stat.total + ' (' + pct + '%)</span>';
      combinedResultTable.appendChild(row);

      // Lưu tiến độ vào từng chapter tương ứng (giống hoàn thành chương thường)
      progress[chId] = progress[chId] || { history: [], wrongIds: [], bestPct: 0, reviewQueue: [] };
      if (!progress[chId].history) progress[chId].history = [];
      if (!progress[chId].wrongIds) progress[chId].wrongIds = [];
      if (!progress[chId].reviewQueue) progress[chId].reviewQueue = [];
      progress[chId].done = true;
      progress[chId].history.push({ date: Date.now(), correct: stat.correct, total: stat.total });
      progress[chId].bestPct = Math.max(progress[chId].bestPct || 0, pct);
    });

    const totalPct = totalCount > 0 ? Math.round((totalCorrect / totalCount) * 100) : 0;
    combinedResultTotal.innerHTML = "<span>Tổng</span><span>" + totalCorrect + "/" + totalCount + " (" + totalPct + "%)</span>";

    // Lưu kết quả tổng hợp riêng với key combined-{timestamp}
    const combinedKey = "combined-" + Date.now();
    progress[combinedKey] = {
      isCombinedResult: true,
      date: Date.now(),
      chapterIds: cc.combinedChapterIds,
      byChapter: byChapter,
      totalCorrect: totalCorrect,
      totalCount: totalCount,
      totalPct: totalPct
    };
    saveJSON(PROGRESS_KEY, progress);
    if (totalPct >= 80) launchConfetti(28);
    return;
  }

  if (cc.isReviewQuiz) {
    quizScreen.classList.remove("active");
    completeScreen.classList.add("active");
    for (let i = 0; i < cc.questions.length; i++) {
      const wasCorrect = cc.results ? !!cc.results[i] : false;
      updateReviewQueueForAnswer(cc.chapterIds[i], cc.questionIds[i], wasCorrect);
    }
    const pctReview = Math.round((cc.correctCount / cc.questions.length) * 100);
    completeEmoji.textContent = pctReview === 100 ? "🏆" : (pctReview >= 70 ? "🎉" : "💪");
    completeTitle.textContent = "Đã ôn xong " + cc.questions.length + " câu";
    completeScore.innerHTML = "Đúng <b>" + cc.correctCount + "/" + cc.questions.length + "</b> câu (" + pctReview + "%)";
    if (pctReview >= 80) launchConfetti(28);
    return;
  }

  if (cc.isWrongQuiz) {
    quizScreen.classList.remove("active");
    completeScreen.classList.add("active");
    const p = progress[cc.originalChapterId];
    const remaining = p && p.wrongIds ? p.wrongIds.length : 0;
    const pct = Math.round((cc.correctCount / cc.questions.length) * 100);
    if (remaining === 0) {
      completeEmoji.textContent = "🏆";
      completeTitle.textContent = "Chúc mừng, bạn đã sửa hết câu sai!";
    } else {
      completeEmoji.textContent = "💪";
      completeTitle.textContent = "Còn " + remaining + " câu sai, tiếp tục cố gắng!";
    }
    completeScore.innerHTML = "Đúng <b>" + cc.correctCount + "/" + cc.questions.length + "</b> câu (" + pct + "%)";
    if (remaining === 0) launchConfetti(28);
    return;
  }

  progress[cc.chapterId] = progress[cc.chapterId] || { history: [], wrongIds: [], bestPct: 0, reviewQueue: [] };
  if (!progress[cc.chapterId].history) progress[cc.chapterId].history = [];
  if (!progress[cc.chapterId].wrongIds) progress[cc.chapterId].wrongIds = [];
  if (!progress[cc.chapterId].reviewQueue) progress[cc.chapterId].reviewQueue = [];
  progress[cc.chapterId].done = true;
  progress[cc.chapterId].correct = cc.correctCount;
  progress[cc.chapterId].total = cc.questions.length;
  progress[cc.chapterId].history.push({ date: Date.now(), correct: cc.correctCount, total: cc.questions.length });
  const pct0 = Math.round((cc.correctCount / cc.questions.length) * 100);
  progress[cc.chapterId].bestPct = Math.max(progress[cc.chapterId].bestPct || 0, pct0);
  if (!saveJSON(PROGRESS_KEY, progress)) return;
  quizScreen.classList.remove("active");
  completeScreen.classList.add("active");
  const pct = Math.round((cc.correctCount / cc.questions.length) * 100);
  completeEmoji.textContent = pct === 100 ? "🏆" : (pct >= 70 ? "🎉" : "💪");
  completeTitle.textContent = pct === 100 ? "Hoàn hảo!" : (pct >= 70 ? "Hoàn thành chương!" : "Đã xong chương");
  completeScore.innerHTML = "Đúng <b>" + cc.correctCount + "/" + cc.questions.length + "</b> câu (" + pct + "%)";
  if (pct >= 80) launchConfetti(28);
}

retryBtn.onclick = function() {
  if (currentChapter.isReviewQuiz) {
    startReviewQuiz();
  } else if (currentChapter.isWrongQuiz) {
    startWrongQuiz(currentChapter.subjectId, currentChapter.originalChapterId);
  } else {
    startChapter(currentChapter.subjectId, currentChapter.chapterId);
  }
};
backToMenuBtn.onclick = function() {
  currentChapter = null;
  completeScreen.classList.remove("active");
  showHome();
  renderDrawer();
  openDrawer();
};

combinedRetryBtn.onclick = function() {
  if (lastCombinedChapterIds.length > 0) startCombinedTest(lastCombinedChapterIds);
};
combinedBackBtn.onclick = function() {
  currentChapter = null;
  combinedResultScreen.classList.remove("active");
  showHome();
  renderDrawer();
  openDrawer();
};

const confettiColors = ["#38BDF8", "#4ADE80", "#FBBF24", "#C084FC", "#F87171"];
function launchConfetti(count) {
  count = count || 18;
  const app = $("app");
  for (let i = 0; i < count; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = (Math.random() * 100) + "%";
    piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
    piece.style.animationDuration = (1.1 + Math.random() * 0.9) + "s";
    piece.style.animationDelay = (Math.random() * 0.25) + "s";
    app.appendChild(piece);
    setTimeout(function() { piece.remove(); }, 2200);
  }
}

/* ==== TÍNH NĂNG: Thống kê nâng cao ==== */

/* Lấy toàn bộ các lượt làm bài (history) từ tất cả các chapter, bỏ qua các entry combined-* */
function computeAllHistoryEntries() {
  const entries = [];
  Object.keys(progress).forEach(function(chId) {
    if (chId.indexOf("combined-") === 0) return;
    const p = progress[chId];
    if (!p || !p.history) return;
    p.history.forEach(function(h) {
      entries.push({ chapterId: chId, date: h.date, correct: h.correct, total: h.total });
    });
  });
  return entries;
}

function computeOverviewStats() {
  const entries = computeAllHistoryEntries();
  let totalQ = 0, totalCorrect = 0;
  const daysSet = {};
  entries.forEach(function(e) {
    totalQ += e.total;
    totalCorrect += e.correct;
    daysSet[dateToStr(new Date(e.date))] = true;
  });
  const avgPct = totalQ > 0 ? Math.round((totalCorrect / totalQ) * 100) : 0;
  return {
    totalQuestions: totalQ,
    avgPct: avgPct,
    daysLearned: Object.keys(daysSet).length,
    currentStreak: streak.currentStreak || 0,
    maxStreak: streak.maxStreak || 0
  };
}

function computeSubjectStats() {
  return subjects.map(function(subj) {
    let doneCount = 0;
    const chapterPcts = [];
    let sumCorrect = 0, sumTotal = 0;
    subj.chapters.forEach(function(ch) {
      const p = progress[ch.id];
      const isDone = !!(p && (p.done || (p.history && p.history.length > 0)));
      if (isDone) doneCount++;
      if (p && p.history && p.history.length > 0) {
        let c = 0, t = 0;
        p.history.forEach(function(h) { c += h.correct; t += h.total; });
        sumCorrect += c; sumTotal += t;
        const chPct = t > 0 ? Math.round((c / t) * 100) : 0;
        chapterPcts.push({ name: ch.name, pct: chPct });
      }
    });
    let weakest = null;
    if (chapterPcts.length > 0) {
      weakest = chapterPcts.reduce(function(min, cur) { return cur.pct < min.pct ? cur : min; });
    }
    const avgPct = sumTotal > 0 ? Math.round((sumCorrect / sumTotal) * 100) : 0;
    return {
      name: subj.name, icon: subj.icon || "📘",
      doneCount: doneCount, totalCount: subj.chapters.length,
      avgPct: avgPct, weakest: weakest, hasData: sumTotal > 0
    };
  });
}

function computeHeatmap() {
  const entries = computeAllHistoryEntries();
  const dayLabels = ["CN", "T2", "T3", "T4", "T5", "T6", "T7"];
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dStr = dateToStr(d);
    let count = 0;
    entries.forEach(function(e) {
      if (dateToStr(new Date(e.date)) === dStr) count += e.total;
    });
    days.push({ dateStr: dStr, count: count, label: dayLabels[d.getDay()] });
  }
  return days;
}

function heatmapBar(count) {
  if (count === 0) return "░";
  if (count <= 3) return "▓";
  if (count <= 6) return "█";
  return "██";
}

function openStatsScreen() {
  homeScreen.classList.add("hidden");
  quizScreen.classList.remove("active");
  completeScreen.classList.remove("active");
  combinedResultScreen.classList.remove("active");
  statsScreen.classList.add("active");
  topTitle.textContent = "Thống kê";
  renderStatsScreen();
}

function closeStatsScreen() {
  statsScreen.classList.remove("active");
  showHome();
}

function renderStatsScreen() {
  const overview = computeOverviewStats();
  const subjStats = computeSubjectStats();
  const heatmap = computeHeatmap();

  let html = "";
  html += '<div class="stats-back-row"><button class="stats-back-btn" id="statsBackBtn">← Quay lại</button><h2 class="stats-title">📊 Thống kê</h2></div>';

  html += '<div class="stats-section"><div class="stats-section-title">TỔNG QUAN</div><div class="stats-overview-grid">' +
    '<div class="stats-card"><span class="stats-card-num">' + overview.totalQuestions + '</span><span class="stats-card-label">câu đã làm</span></div>' +
    '<div class="stats-card"><span class="stats-card-num">' + overview.avgPct + '%</span><span class="stats-card-label">tỉ lệ đúng TB</span></div>' +
    '<div class="stats-card"><span class="stats-card-num">🔥' + overview.currentStreak + '</span><span class="stats-card-label">streak hiện tại</span></div>' +
    '<div class="stats-card"><span class="stats-card-num">🏆' + overview.maxStreak + '</span><span class="stats-card-label">streak cao nhất</span></div>' +
    '<div class="stats-card" style="grid-column:span 2"><span class="stats-card-num">' + overview.daysLearned + '</span><span class="stats-card-label">ngày đã học</span></div>' +
    '</div></div>';

  html += '<div class="stats-section"><div class="stats-section-title">HOẠT ĐỘNG 7 NGÀY GẦN NHẤT</div><div class="stats-heatmap"></div></div>';

  statsBody.innerHTML = html;
  buildHeatmapSection(heatmap);
  buildSubjectStatsSection(subjStats);
  $("statsBackBtn").onclick = closeStatsScreen;
}

/* Xây dựng phần heatmap riêng để tránh lỗi ghép chuỗi phức tạp phía trên */
function buildHeatmapSection(heatmap) {
  const container = statsBody.querySelector(".stats-heatmap");
  if (!container) return;
  container.innerHTML = "";
  heatmap.forEach(function(d) {
    const cell = document.createElement("div");
    cell.className = "stats-heatmap-cell";
    cell.innerHTML =
      '<span class="stats-heatmap-bar">' + heatmapBar(d.count) + '</span>' +
      '<span class="stats-heatmap-count">' + d.count + '</span>' +
      '<span class="stats-heatmap-day">' + escapeHtml(d.label) + '</span>';
    container.appendChild(cell);
  });
}

function buildSubjectStatsSection(subjStats) {
  const section = document.createElement("div");
  section.className = "stats-section";
  let inner = '<div class="stats-section-title">THEO MÔN HỌC</div>';
  section.innerHTML = inner;
  if (subjStats.length === 0) {
    const empty = document.createElement("div");
    empty.className = "stats-empty";
    empty.textContent = "Chưa có dữ liệu môn học.";
    section.appendChild(empty);
  } else {
    subjStats.forEach(function(s) {
      const card = document.createElement("div");
      card.className = "stats-subject-card";
      card.innerHTML =
        '<div class="stats-subject-name">' + escapeHtml(s.icon) + ' ' + escapeHtml(s.name) + '</div>' +
        '<div class="stats-subject-line">Hoàn thành: <b>' + s.doneCount + '/' + s.totalCount + '</b> chương</div>' +
        (s.hasData ? '<div class="stats-subject-line">Tỉ lệ đúng TB: <b>' + s.avgPct + '%</b></div>' : '<div class="stats-subject-line">Chưa có dữ liệu làm bài.</div>') +
        (s.weakest ? '<div class="stats-subject-line">Chương yếu nhất: <span class="weak">' + escapeHtml(s.weakest.name) + ' (' + s.weakest.pct + '%)</span></div>' : '');
      section.appendChild(card);
    });
  }
  statsBody.appendChild(section);
}

/* ---- TÍNH NĂNG 6: Keyboard shortcuts ---- */
document.addEventListener("keydown", function(e) {
  const tag = (e.target && e.target.tagName) || "";
  const isTyping = tag === "INPUT" || tag === "TEXTAREA";

  // Esc: đóng drawer / đóng thống kê, luôn hoạt động kể cả khi đang gõ
  if (e.key === "Escape") {
    if (drawer.classList.contains("open")) { closeDrawer(); return; }
    if (statsScreen.classList.contains("active")) { closeStatsScreen(); return; }
    return;
  }

  if (isTyping) return; // các phím còn lại không can thiệp khi người dùng đang gõ input

  const key = e.key;
  const lower = key.toLowerCase();

  // H: về Home
  if (lower === "h") {
    if (quizScreen.classList.contains("active")) return; // tránh thoát nhầm giữa bài
    showHome();
    return;
  }
  // S: bật/tắt âm thanh
  if (lower === "s") {
    soundOn = !soundOn;
    saveJSON(SOUND_KEY, soundOn);
    updateSoundToggleBtn();
    return;
  }
  // T: đổi theme
  if (lower === "t") {
    toggleTheme();
    return;
  }

  // Các phím chỉ hoạt động trong màn hình quiz
  if (!quizScreen.classList.contains("active") || !currentChapter) return;
  const cc = currentChapter;
  const q = cc.questions[cc.index];
  const qType = q.type || "mcq";

  // Enter/Space: qua câu (nếu đã trả lời) hoặc submit (fill_blank/matching)
  if (key === "Enter" || key === " ") {
    e.preventDefault();
    if (nextBtn.classList.contains("show")) {
      nextBtn.click();
      return;
    }
    if (qType === "fill_blank") {
      const btn = $("fillBlankSubmitBtn");
      if (btn) btn.click();
    } else if (qType === "matching") {
      const btn = $("matchingSubmitBtn");
      if (btn && btn.classList.contains("show")) btn.click();
    }
    return;
  }

  // 1-4 / A-D: chọn đáp án (mcq)
  if (qType === "mcq" && !cc.answered) {
    const numMap = { "1": 0, "2": 1, "3": 2, "4": 3, "5": 4, "6": 5 };
    const letterMap = { "a": 0, "b": 1, "c": 2, "d": 3, "e": 4, "f": 5 };
    let idx = null;
    if (numMap[key] !== undefined) idx = numMap[key];
    else if (letterMap[lower] !== undefined) idx = letterMap[lower];
    if (idx !== null && idx < q.options.length) {
      handleAnswer(idx);
      return;
    }
  }
  // true_false: dùng 1/A cho Đúng, 2/B cho Sai
  if (qType === "true_false" && !cc.answered) {
    if (key === "1" || lower === "a") { handleTrueFalse(true); return; }
    if (key === "2" || lower === "b") { handleTrueFalse(false); return; }
  }
});

function init() {
  renderDrawer();
  showHome();
  updateStreakDisplay();
}
init();
</script>
